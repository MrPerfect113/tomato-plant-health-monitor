<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tomato Plant Health Monitor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: Inter, system-ui, sans-serif;
  font-size: 1.05rem;
}

.btn {
  height: 54px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  border: 2px solid transparent;
  transition: all 0.12s ease;
}

.btn:hover { transform: scale(1.02); }
.btn:active { transform: scale(0.97); }

.btn-active {
  border-color: #22c55e;
  box-shadow: 0 0 8px rgba(34,197,94,0.55);
}

.btn-disabled {
  opacity: 0.45;
  pointer-events: none;
}

input[type=range] {
  height: 12px;
}

input[type=range]::-webkit-slider-thumb {
  width: 22px;
  height: 22px;
  background: #00d4ff;
  border-radius: 50%;
}
</style>
</head>

<body class="bg-[#0f1217] text-[#f0f4ff]">

<header class="h-16 flex items-center justify-between px-6 border-b border-[#2a2a3f]">
<div>

<h1 class="text-3xl font-bold tracking-wide text-[#d0d4ff]">
Tomato Plant Health Monitor
</h1>

<div class="text-sm text-cyan-400 mt-1">
Distance: <span id="distanceValue">0.00</span> cm
</div>



</div>
</header>

<main class="flex h-[calc(100vh-64px)]">

<!-- VIDEO -->
<section class="w-4/5 p-6">

<div class="relative h-full rounded-xl border border-[#00d4ff] bg-black">

<img id="video"
class="absolute inset-0 w-full h-full object-cover rounded-xl hidden" />

<div id="placeholder"
class="absolute inset-0 flex items-center justify-center text-lg text-[#9aa4ff]">
No video stream
</div>

</div>

</section>

<div class="border-l border-gray-700"></div>

<!-- SIDEBAR -->
<aside class="w-1/5 bg-[#1a1a2e] px-6 py-6 flex flex-col gap-8 overflow-y-auto">

<!-- STREAM -->
<div class="flex flex-col gap-4">

<button onclick="startStream()" class="btn bg-blue-500 text-white">
Start Stream
</button>

<button onclick="stopStream()" class="btn bg-red-500 text-white">
Stop Stream
</button>

</div>

<!-- DETECTION -->
<div class="flex flex-col gap-4">

<button onclick="showDetectionPanel()" class="btn bg-emerald-500 text-white">
Start Detection
</button>

<button onclick="stopDetection()" class="btn bg-orange-400 text-black">
Stop Detection
</button>

<div class="text-sm font-semibold text-[#22c55e]">
Active Model: <span id="activeModel">None</span>
</div>

<div id="detectionPanel"
class="hidden p-4 rounded-xl bg-[#1e1e2e] flex flex-col gap-3">

<button id="tomatoBtn"
onclick="selectModel('tomato')"
class="btn bg-blue-600 text-white">
Tomato Condition
</button>

<button id="leafBtn"
onclick="selectModel('leaf')"
class="btn bg-purple-600 text-white">
Leaf Disease
</button>

<div>

<div class="flex justify-between items-center mb-2">
<span class="text-sm">Confidence</span>
<span id="confValue" class="text-lg font-bold text-[#00d4ff]">30%</span>
</div>

<input type="range"
min="1" max="100" value="30"
class="w-full"
oninput="setConfidence(this.value)">

</div>
</div>
</div>

<!-- RAIL CONTROL -->
<div class="flex flex-col gap-4">

<h2 class="text-xl font-semibold text-[#d0d4ff]">
Rail Control
</h2>

<div id="railStatus" class="text-sm text-cyan-400">
Rail Status: Idle
</div>

<div id="fullDetectProgress"
class="hidden w-full h-3 rounded bg-gray-700 overflow-hidden">

<div id="progressBar"
class="h-full bg-emerald-400 transition-all duration-300"
style="width:0%">
</div>

</div>

<button id="fullDetectBtn"
onclick="startFullDetect()"
class="btn bg-slate-600 text-white btn-disabled">
Full Detect
</button>

<button id="forwardBtn"
onclick="toggleForward()"
class="btn bg-[#2a2a3f] text-white btn-disabled">
Forward
</button>

<button id="backwardBtn"
onclick="toggleBackward()"
class="btn bg-[#2a2a3f] text-white btn-disabled">
Backward
</button>

</div>

<!-- CAMERA SERVO CONTROL -->

<div class="flex flex-col gap-3">

<h2 class="text-xl font-semibold text-[#d0d4ff]">
Camera Control
</h2>

<div class="text-sm text-cyan-400">
Angle: <span id="servoValue">90</span>°
</div>

<div class="flex gap-2">

<button class="btn bg-blue-600 text-white" onclick="moveServo(0)">
0°
</button>

<button class="btn bg-blue-600 text-white" onclick="moveServo(90)">
90°
</button>

<button class="btn bg-blue-600 text-white" onclick="moveServo(180)">
180°
</button>

</div>

</div>

</aside>
</main>

<script src="/js/dashboard.js"></script>
</body>
</html>
